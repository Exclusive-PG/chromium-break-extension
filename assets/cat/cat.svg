<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 185 175" width="120" height="120" overflow="visible">
  <defs>
    <style>
      .tail {
        transform-box: fill-box;
        transform-origin: 15% 15%;
        animation: tailSway 2.5s ease-in-out infinite;
      }
      .body-group {
        transform-box: fill-box;
        transform-origin: center;
        animation: breathe 3s ease-in-out infinite;
      }
      .eye-l {
        transform-box: fill-box;
        transform-origin: center;
        animation: blink 5s ease-in-out infinite;
      }
      .eye-r {
        transform-box: fill-box;
        transform-origin: center;
        animation: blink 5s ease-in-out infinite 0.15s;
      }
      @keyframes tailSway {
        0%, 100% { transform: rotate(-10deg); }
        50%      { transform: rotate(10deg); }
      }
      @keyframes breathe {
        0%, 100% { transform: scaleY(1); }
        50%      { transform: scaleY(1.04); }
      }
      @keyframes blink {
        0%, 92%, 100% { transform: scaleY(1); }
        96%           { transform: scaleY(0.05); }
      }
    </style>
  </defs>

  <!-- Tail -->
  <path class="tail"
        d="M 118 152 C 155 145 165 118 155 100 C 147 86 130 90 136 104"
        fill="none" stroke="#e07535" stroke-width="13" stroke-linecap="round"/>
  <path class="tail"
        d="M 118 152 C 155 145 165 118 155 100 C 147 86 130 90 136 104"
        fill="none" stroke="#f4a261" stroke-width="9" stroke-linecap="round"/>

  <!-- Body -->
  <g class="body-group">
    <ellipse cx="80" cy="146" rx="44" ry="36" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>
    <ellipse cx="100" cy="152" rx="22" ry="18" fill="#f4a261"/>
  </g>

  <!-- Head -->
  <circle cx="80" cy="70" r="48" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>
  <ellipse cx="62" cy="62" rx="21" ry="15" fill="#f4a261"/>

  <!-- Left ear -->
  <polygon points="40,44 26,12 62,36" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>
  <polygon points="43,41 32,16 59,36" fill="#ffc8d3"/>

  <!-- Right ear -->
  <polygon points="120,44 134,12 98,36" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>
  <polygon points="117,41 128,16 101,36" fill="#ffc8d3"/>

  <!-- Left eye -->
  <g class="eye-l">
    <ellipse cx="64" cy="74" rx="10" ry="12" fill="#1a1a2e"/>
    <ellipse cx="64" cy="75" rx="6.5" ry="8.5" fill="#52b788"/>
    <ellipse cx="64" cy="75" rx="3.5" ry="6"   fill="#1a1a2e"/>
    <circle  cx="68" cy="71" r="3"              fill="white"/>
  </g>

  <!-- Right eye -->
  <g class="eye-r">
    <ellipse cx="96" cy="74" rx="10" ry="12" fill="#1a1a2e"/>
    <ellipse cx="96" cy="75" rx="6.5" ry="8.5" fill="#52b788"/>
    <ellipse cx="96" cy="75" rx="3.5" ry="6"   fill="#1a1a2e"/>
    <circle  cx="100" cy="71" r="3"             fill="white"/>
  </g>

  <!-- Nose -->
  <polygon points="80,88 76,93 84,93" fill="#ffc8d3"/>

  <!-- Mouth -->
  <path d="M 76 93 Q 80 98 84 93"
        fill="none" stroke="#ddd" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Whiskers left -->
  <line x1="26" y1="88" x2="68" y2="91" stroke="#ddd" stroke-width="1"/>
  <line x1="24" y1="95" x2="68" y2="95" stroke="#ddd" stroke-width="1"/>

  <!-- Whiskers right -->
  <line x1="134" y1="88" x2="92" y2="91" stroke="#ddd" stroke-width="1"/>
  <line x1="136" y1="95" x2="92" y2="95" stroke="#ddd" stroke-width="1"/>

</svg>
