<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BreakCat</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">

    <header class="header">
      <span class="logo">BreakCat</span>
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <div class="method-pill">Pomodoro · 25 min</div>

    <div class="cat-placeholder" id="catContainer">
      <!-- cat will go here -->
    </div>

    <div class="timer-block">
      <div class="timer" id="timer">25:00</div>
      <div class="phase-label" id="phaseLabel">Work Session</div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="startBtn">Start</button>
      <button class="btn btn-ghost" id="stopBtn">Stop</button>
    </div>

    <div class="stats-row">
      <div class="stat">
        <span class="stat-value" id="streak">0</span>
        <span class="stat-label">day streak</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-value" id="todaySessions">0</span>
        <span class="stat-label">today</span>
      </div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
